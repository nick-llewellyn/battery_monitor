name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

# Cancel superseded matrix runs on the same ref (typically a force-push to
# an open PR). Pure cost optimization; has no functional effect on a
# linear push history. The group is keyed on workflow + ref so push to
# main and pull_request runs against the same head do not cancel each
# other.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Matrix exercises both the declared SDK floor (3.35.0, the first
    # stable release shipping Dart 3.9 -- which is the minimum the
    # resolved lockfile actually requires) and the .fvmrc-pinned
    # current version (3.41.7). Format check runs only on the pinned
    # version because `dart format` output shifts between Dart minors
    # and we do not want spurious failures across the matrix.
    name: Dart + Android (Flutter ${{ matrix.flutter }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flutter: ['3.35.0', '3.41.7']
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # JDK 17 satisfies AGP 8.x and the example's
      # sourceCompatibility / targetCompatibility / jvmTarget pin
      # (JavaVersion.VERSION_17 in example/android/app/build.gradle.kts).
      # Provisioned before Flutter setup so the embedded Gradle daemon
      # uses the correct JAVA_HOME from first invocation.
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter }}
          channel: 'stable'

      - name: Resolve package dependencies
        run: flutter pub get

      - name: Verify formatting
        if: matrix.flutter == '3.41.7'
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze package
        run: dart analyze .

      - name: Run Dart tests
        run: flutter test

      - name: Resolve example dependencies
        working-directory: example
        run: flutter pub get

      - name: Analyze example app
        working-directory: example
        run: flutter analyze

      - name: Run example tests
        working-directory: example
        run: flutter test

      # Native Android compile gate. Runs matrix-wide so SDK-floor
      # regressions in plugin Kotlin or AGP/Gradle interaction surface
      # on the 3.35.0 leg, not only on the .fvmrc pin. assembleDebug is
      # the cheapest task that exercises the full plugin -> example
      # link path (Kotlin compile, manifest merge, resource pack, dex).
      # Relies on the prior `flutter pub get` in example/ to have
      # generated .flutter-plugins-dependencies.
      - name: Build example APK (debug)
        working-directory: example/android
        run: ./gradlew assembleDebug

  ios:
    # Native iOS compile gate. Runs on macos-latest because that is the
    # only runner image with Xcode + iOS simulator SDKs. Separate job
    # rather than a matrix axis on `build:` so the linux and macOS legs
    # run in parallel (wall time = max, not sum). Same Flutter matrix
    # as `build:` so SDK-floor regressions in BatteryMonitorPlugin.swift
    # or the podspec surface on both 3.35.0 and 3.41.7.
    #
    # `flutter build ios --simulator --no-codesign` is the cheapest task
    # that exercises the full plugin -> example link path on the Swift
    # side: it transparently runs `pod install` in example/ios as part
    # of its build pipeline, skips provisioning profile setup, and
    # produces a .app for the simulator (no device signing required).
    #
    # Note: macos-latest minutes are billed at ~10x the rate of
    # ubuntu-latest. CI-6 (Pods + pub cache) will reduce the cold-build
    # cost; for now, expect 5-10 min per leg until that lands.
    name: iOS (Flutter ${{ matrix.flutter }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        flutter: ['3.35.0', '3.41.7']
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter }}
          channel: 'stable'

      - name: Resolve package dependencies
        run: flutter pub get

      - name: Resolve example dependencies
        working-directory: example
        run: flutter pub get

      - name: Build example for iOS simulator
        working-directory: example
        run: flutter build ios --simulator --no-codesign
