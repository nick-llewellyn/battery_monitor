name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

jobs:
  build:
    # Matrix exercises the pinned current version (3.41.7, matches
    # .fvmrc). Format check runs only on the pinned version because
    # `dart format` output can shift between Dart minors and we don't
    # want spurious failures across the matrix. Add older Flutter
    # versions to the matrix here once the package's declared SDK
    # floor is widened.
    name: Format / analyze / Dart tests (Flutter ${{ matrix.flutter }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flutter: ['3.41.7']
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter }}
          channel: 'stable'

      - name: Resolve package dependencies
        run: flutter pub get

      - name: Verify formatting
        if: matrix.flutter == '3.41.7'
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze package
        run: dart analyze .

      - name: Run Dart tests
        run: flutter test

      - name: Resolve example dependencies
        working-directory: example
        run: flutter pub get

      - name: Analyze example app
        working-directory: example
        run: flutter analyze

      - name: Run example tests
        working-directory: example
        run: flutter test
