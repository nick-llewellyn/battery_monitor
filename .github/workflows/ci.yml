name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

# Cancel superseded matrix runs on the same ref (typically a force-push to
# an open PR). Pure cost optimization; has no functional effect on a
# linear push history. The group is keyed on workflow + ref so push to
# main and pull_request runs against the same head do not cancel each
# other.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Matrix exercises both the declared SDK floor (3.35.0, the first
    # stable release shipping Dart 3.9 -- which is the minimum the
    # resolved lockfile actually requires) and the .fvmrc-pinned
    # current version (3.41.7). Format check runs only on the pinned
    # version because `dart format` output shifts between Dart minors
    # and we do not want spurious failures across the matrix.
    name: Dart + Android (Flutter ${{ matrix.flutter }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flutter: ['3.35.0', '3.41.7']
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # JDK 17 satisfies AGP 8.x and the example's
      # sourceCompatibility / targetCompatibility / jvmTarget pin
      # (JavaVersion.VERSION_17 in example/android/app/build.gradle.kts).
      # Provisioned before Flutter setup so the embedded Gradle daemon
      # uses the correct JAVA_HOME from first invocation.
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter }}
          channel: 'stable'
          cache: true

      # pubspec.lock is gitignored (standard for libraries), so the
      # cache key falls back to pubspec.yaml content hash with a
      # matrix.flutter discriminator. restore-keys allows a partial
      # restore when only the pubspec changed: pub will reuse the
      # bulk of the existing cache and only fetch the deltas.
      - name: Cache pub
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ matrix.flutter }}-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            pub-${{ runner.os }}-${{ matrix.flutter }}-

      # Gradle caches dominate the Android cold-build cost. Both the
      # global module cache (~/.gradle/caches) and the per-version
      # wrapper download (~/.gradle/wrapper) benefit. matrix.flutter
      # is in the key because Flutter version selects which AGP /
      # Kotlin Gradle plugin versions land via flutter_tools.
      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ matrix.flutter }}-${{ hashFiles('example/android/**/*.gradle*', 'example/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ matrix.flutter }}-

      - name: Resolve package dependencies
        run: flutter pub get

      - name: Verify formatting
        if: matrix.flutter == '3.41.7'
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze package
        run: dart analyze .

      # `--coverage` writes coverage/lcov.info. Generated matrix-wide
      # so coverage gaps caused by floor-only or pin-only code paths
      # surface on both legs; uploaded pin-only below to avoid double-
      # counting line coverage in downstream reports.
      - name: Run Dart tests
        run: flutter test --coverage

      # Coverage shipped two ways:
      #   1. Workflow artifact for direct download / local debugging
      #      without depending on a third-party dashboard.
      #   2. Codecov for diff coverage and PR comments. Codecov v4
      #      requires a repository upload token even on public repos
      #      when the target branch is protected; the token is set
      #      via the CODECOV_TOKEN secret (configured in repo
      #      settings, not committed). `fail_ci_if_error: false`
      #      keeps Codecov outages from breaking the build (third-
      #      party SLO is not in our CI critical path).
      - name: Upload coverage artifact
        if: matrix.flutter == '3.41.7'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: error
          retention-days: 14

      - name: Upload coverage to Codecov
        if: matrix.flutter == '3.41.7'
        uses: codecov/codecov-action@v6
        with:
          files: coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Resolve example dependencies
        working-directory: example
        run: flutter pub get

      - name: Analyze example app
        working-directory: example
        run: flutter analyze

      - name: Run example tests
        working-directory: example
        run: flutter test

      # Native Android compile gate. Runs matrix-wide so SDK-floor
      # regressions in plugin Kotlin or AGP/Gradle interaction surface
      # on the 3.35.0 leg, not only on the .fvmrc pin. `flutter build
      # apk --debug` exercises the full plugin -> example link path
      # (Kotlin compile, manifest merge, resource pack, dex) via
      # Flutter's tooling, which invokes Gradle through the wrapper
      # JAR directly. Going through `flutter` (not `./gradlew`) is the
      # canonical CI path because the example's `gradlew` and
      # `gradlew.bat` launcher scripts are gitignored by the standard
      # Flutter project template; only `gradle-wrapper.jar` is
      # committed.
      - name: Build example APK (debug)
        working-directory: example
        run: flutter build apk --debug

  ios:
    # Native iOS compile gate. Runs on macos-latest because that is the
    # only runner image with Xcode + iOS simulator SDKs. Separate job
    # rather than a matrix axis on `build:` so the linux and macOS legs
    # run in parallel (wall time = max, not sum). Same Flutter matrix
    # as `build:` so SDK-floor regressions in BatteryMonitorPlugin.swift
    # or the podspec surface on both 3.35.0 and 3.41.7.
    #
    # `flutter build ios --simulator --no-codesign` is the cheapest task
    # that exercises the full plugin -> example link path on the Swift
    # side: it transparently runs `pod install` in example/ios as part
    # of its build pipeline, skips provisioning profile setup, and
    # produces a .app for the simulator (no device signing required).
    #
    # Note: macos-latest minutes are billed at ~10x the rate of
    # ubuntu-latest. CI-6 (Pods + pub cache) will reduce the cold-build
    # cost; for now, expect 5-10 min per leg until that lands.
    name: iOS (Flutter ${{ matrix.flutter }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        flutter: ['3.35.0', '3.41.7']
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter }}
          channel: 'stable'
          cache: true

      - name: Cache pub
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ matrix.flutter }}-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            pub-${{ runner.os }}-${{ matrix.flutter }}-

      # CocoaPods is the dominant cold-build cost on macos-latest.
      # Caches the user-level pod source cache (downloaded podspecs)
      # and the per-project resolved Pods/ tree. Podfile.lock is
      # gitignored, so the key falls back to Podfile + pubspec.yaml
      # (Flutter regenerates plugin Pod entries from the example's
      # pubspec on every `pub get`). matrix.flutter is in the key
      # because the Flutter framework version selects the
      # Flutter.podspec content.
      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/CocoaPods
            example/ios/Pods
          key: pods-${{ matrix.flutter }}-${{ hashFiles('example/ios/Podfile', '**/pubspec.yaml') }}
          restore-keys: |
            pods-${{ matrix.flutter }}-

      - name: Resolve package dependencies
        run: flutter pub get

      - name: Resolve example dependencies
        working-directory: example
        run: flutter pub get

      - name: Build example for iOS simulator
        working-directory: example
        run: flutter build ios --simulator --no-codesign

  publish-check:
    # Publication readiness gate: pana scoring + `pub publish --dry-run`.
    # Pin-only because pana scoring and publish-time validation are
    # output-format-sensitive (Dart minor-version drift shifts pana
    # heuristics, and pub.dev itself scores against the latest stable
    # Dart). The .fvmrc pin is the closest proxy to what pub.dev will
    # see at release time. Per the standard pattern, pin-only gates
    # avoid spurious matrix-wide failures from formatter/scorer drift.
    #
    # ubuntu-latest is sufficient: neither pana nor publish dry-run
    # invokes the Android or iOS toolchains.
    name: pana + publish dry-run (Flutter 3.41.7)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'
          cache: true

      # Pin-only job: matrix.flutter does not exist here, so the
      # cache key uses the literal pinned version. Keeps this job's
      # cache namespace separate from the matrix-keyed `build:` and
      # `ios:` caches. `pana` itself lives under ~/.pub-cache after
      # `dart pub global activate`, so this cache also avoids
      # re-downloading and re-snapshotting pana on every run.
      - name: Cache pub
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-3.41.7-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            pub-${{ runner.os }}-3.41.7-

      - name: Resolve package dependencies
        run: flutter pub get

      - name: Activate pana
        run: dart pub global activate pana

      # `--exit-code-threshold N` exits non-zero when
      # (maxPoints - grantedPoints) > N. Current baseline is 140/160
      # (-10 file conventions, -10 platform support; the latter is
      # inherent because the plugin only ships android+ios). Threshold
      # of 30 enforces a floor of 130/160 per CI-3 plan; tighten to 20
      # once the file-convention points are recovered.
      - name: Run pana
        run: pana --no-warning --exit-code-threshold 30 .

      # Catches missing LICENSE / CHANGELOG, malformed pubspec
      # description, missing topics, and the Flutter upper-bound
      # deprecation. Fails on any warning, matching pub.dev's own
      # publish-time gate.
      - name: Verify pub publish dry-run
        run: flutter pub publish --dry-run

  dependency-review:
    # Supply-chain gate: flags newly-introduced dependencies with known
    # CVEs or disallowed licenses by diffing the PR against the base
    # ref. PR-scoped because the action requires a base..head diff;
    # `push` events to main have no equivalent context. Free on public
    # repos (no GitHub Advanced Security required).
    #
    # `fail-on-severity: high` is the starting floor per the CI-7 plan;
    # tighten to `moderate` once we observe real signal volume.
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Review dependencies
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
