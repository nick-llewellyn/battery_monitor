name: battery_monitor_example
description: >-
  Showcase app for the `battery_monitor` Flutter plugin. Subscribes to
  the three native EventChannels through `BatteryProvider` /
  `BatteryState` and renders the live values in a single screen.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5
  flutter: 3.41.7

dependencies:
  flutter:
    sdk: flutter
  battery_monitor:
    path: ../
  cupertino_icons: ^1.0.8
  # Pulled in by the example app -- mirrors the package surface so the
  # demo can read `Signal<T>.value` and rebuild via `Watch` widgets.
  signals: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
