name: battery_monitor_example
description: >-
  Showcase app for the `battery_monitor` Flutter plugin. Subscribes to
  the three native EventChannels through `BatteryProvider` /
  `BatteryState` and renders the live values in a single screen.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0
  flutter: '>=3.35.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  battery_monitor:
    path: ../
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
