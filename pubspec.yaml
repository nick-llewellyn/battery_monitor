name: battery_status
description: >-
  Event-driven battery level, charging state, and power-save mode for
  Flutter. Native EventChannels (Android, iOS) lifted into
  ValueListenables; injectable for tests.
version: 1.0.1
homepage: https://nllewellyn.com
repository: https://github.com/nick-llewellyn/battery_status
issue_tracker: https://github.com/nick-llewellyn/battery_status/issues

topics:
  - battery
  - power
  - hardware
  - platform-channels

# Explicit platform allow-list. The plugin ships native EventChannel
# implementations for Android (Kotlin, BroadcastReceiver-backed) and
# iOS (Swift, NotificationCenter-backed). Other platforms have no
# equivalent battery API surface today, so the package is not
# advertised for them.
platforms:
  android:
  ios:

# Supported environment range. The package only uses standard Flutter
# primitives (`ValueListenable`, `EventChannel`) plus `Object.hash`
# and enum/switch syntax. The floor is set at Flutter 3.35.0 / Dart
# 3.9.0 -- the first stable release shipping Dart 3.9, which is the
# minimum the resolved lockfile (and `flutter_lints ^6.0.0` via its
# `lints ^6.0.0` transitive) actually requires. CI exercises both the
# floor and the .fvmrc-pinned current version (3.41.7).
environment:
  sdk: ^3.9.0
  flutter: '>=3.35.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Used in the unit suite for richer assertions on stream output and
  # error variants. Kept under dev_dependencies so consumers do not
  # transitively depend on the testing matchers package.
  checks: ^0.3.1

flutter:
  plugin:
    platforms:
      android:
        package: com.nllewellyn.battery_status
        pluginClass: BatteryStatusPlugin
      ios:
        pluginClass: BatteryStatusPlugin
